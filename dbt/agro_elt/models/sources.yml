version: 2

sources:
  - name: bronze
    schema: analytics_engineering
    tables:
      - name: bronze_locations
        description: "Seeded locations (city/state/region + lat/lon)."

      - name: bronze_weather_daily
        description: "Daily weather ingested from Open-Meteo."
        loaded_at_field: ingested_at
        freshness:
          warn_after: {count: 2, period: day}
          error_after: {count: 7, period: day}