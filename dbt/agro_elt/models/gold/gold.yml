version: 2

models:
  - name: gold_dim_location
    columns:
      - name: location_key
        tests: [unique, not_null]

  - name: gold_dim_date
    columns:
      - name: date_day
        tests: [unique, not_null]

  - name: gold_fct_weather_daily
    columns:
      - name: date_day
        tests: [not_null]
      - name: location_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('gold_dim_location')
                field: location_key