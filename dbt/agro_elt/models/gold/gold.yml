version: 2

models:
  - name: gold_dim_location
    columns:
      - name: location_key
        tests:
          - not_null
          - unique

  - name: gold_dim_date
    columns:
      - name: date_day
        tests:
          - not_null
          - unique

  - name: gold_fct_weather_daily
    columns:
      - name: date_day
        tests:
          - not_null
      - name: location_key
        tests:
          - not_null

    data_tests:
      - relationships:
          arguments:
            field: location_key
            to: ref('gold_dim_location')