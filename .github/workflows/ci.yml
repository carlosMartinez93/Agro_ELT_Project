name: CI - dbt build (PR)

on:
  pull_request:

permissions:
  id-token: write
  contents: read

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auth to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==1.8.7" "dbt-bigquery==1.8.3"

      - name: dbt build (models + tests) + docs
        env:
          DBT_PROFILES_DIR: ${{ github.workspace }}/dbt/agro_elt
        run: |
          cd dbt/agro_elt
          dbt debug
          dbt build --select silver_weather_daily gold_dim_location gold_dim_date gold_fct_weather_daily
          dbt docs generate

      - name: Upload dbt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dbt-target-ci
          path: dbt/agro_elt/target
